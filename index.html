<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mundial Empresarial UGB</title>
<style>
  :root {
    --verde: #00C853;
    --verde-dark: #007B33;
    --verde-neon: #39FF14;
    --negro: #0A0A0A;
    --negro-mid: #111827;
    --dorado: #FFD700;
    --dorado-dark: #B8860B;
    --blanco: #F8F8F8;
    --gris: #1E293B;
    --accent: #A3E635;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: var(--negro);
    font-family: 'Arial Black', 'Helvetica Neue', sans-serif;
    color: var(--blanco);
    touch-action: manipulation;
  }

  /* ═══════════════════════════════════════════
     PANTALLA INICIAL
  ═══════════════════════════════════════════ */
  #screen-select {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    background: radial-gradient(ellipse at 50% 0%, #0d3320 0%, #0A0A0A 60%);
    overflow-y: auto;
    padding: 0 0 24px 0;
  }

  .header-banner {
    width: 100%;
    background: linear-gradient(135deg, var(--negro-mid) 0%, #0d1f0f 100%);
    border-bottom: 2px solid var(--verde-neon);
    padding: 28px 20px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .header-banner::before {
    content: '';
    position: absolute;
    top: -40px; left: -40px; right: -40px; bottom: -40px;
    background: radial-gradient(ellipse at 50% -20%, rgba(57,255,20,0.10) 0%, transparent 70%);
    pointer-events: none;
  }

  .header-stars {
    font-size: 22px;
    letter-spacing: 8px;
    color: var(--dorado);
    margin-bottom: 6px;
    filter: drop-shadow(0 0 8px var(--dorado));
  }

  .header-title {
    font-size: clamp(26px, 7vw, 44px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    line-height: 1.1;
    background: linear-gradient(to bottom, #ffffff 30%, var(--dorado) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 2px 12px rgba(255,215,0,0.3));
  }

  .header-sub {
    font-size: clamp(11px, 3vw, 15px);
    font-weight: 700;
    color: var(--verde-neon);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-top: 6px;
    opacity: 0.9;
  }

  .neon-divider {
    width: 80%;
    max-width: 320px;
    height: 2px;
    background: linear-gradient(to right, transparent, var(--verde-neon), transparent);
    margin: 18px auto 0;
    box-shadow: 0 0 12px var(--verde-neon);
  }

  .select-label {
    font-size: clamp(13px, 3.5vw, 17px);
    font-weight: 700;
    color: var(--dorado);
    text-transform: uppercase;
    letter-spacing: 3px;
    text-align: center;
    margin: 22px 20px 16px;
    text-shadow: 0 0 16px rgba(255,215,0,0.4);
  }

  .teams-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    padding: 0 20px;
    width: 100%;
    max-width: 520px;
  }

  .team-btn {
    background: linear-gradient(135deg, var(--gris) 0%, #0d1f0f 100%);
    border: 2px solid rgba(57,255,20,0.25);
    border-radius: 16px;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: all 0.22s ease;
    position: relative;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  .team-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(57,255,20,0.06) 0%, transparent 60%);
    border-radius: 14px;
  }

  .team-btn:active, .team-btn.selected {
    border-color: var(--verde-neon);
    box-shadow: 0 0 20px rgba(57,255,20,0.35), inset 0 0 20px rgba(57,255,20,0.08);
    transform: scale(0.97);
  }

  .team-btn img {
    width: 80px;
    height: auto;
    object-fit: contain;
    filter: drop-shadow(0 4px 12px rgba(0,0,0,0.5));
    transition: transform 0.2s;
  }

  .team-btn:active img { transform: scale(1.05); }

  .team-flag {
    font-size: 26px;
    line-height: 1;
  }

  .team-name {
    font-size: 13px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--blanco);
    text-align: center;
  }

  .start-hint {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-align: center;
    margin: 18px 20px 0;
    line-height: 1.6;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ═══════════════════════════════════════════
     PANTALLA CÁMARA
  ═══════════════════════════════════════════ */
  #screen-camera {
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    background: var(--negro);
    position: relative;
  }

  #viewport {
    position: relative;
    flex: 1;
    overflow: hidden;
    background: #000;
  }

  #video {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* espejo selfie */
    background: #000;
  }

  #overlay-shirt {
    position: absolute;
    pointer-events: none;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
  }

  #overlay-frame {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    pointer-events: none;
    z-index: 20;
  }

  .guide-label {
    position: absolute;
    top: 12%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(57,255,20,0.5);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    white-space: nowrap;
    pointer-events: none;
    z-index: 15;
    text-align: center;
    line-height: 1.5;
  }

  /* Controles de ajuste */
  .controls-panel {
    background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.85) 100%);
    border-top: 1px solid rgba(57,255,20,0.2);
    padding: 10px 12px 4px;
    z-index: 30;
  }

  .controls-row {
    display: flex;
    gap: 6px;
    justify-content: center;
    align-items: center;
    margin-bottom: 8px;
  }

  .ctrl-label {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1.5px;
    color: rgba(255,215,0,0.7);
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 4px;
  }

  .ctrl-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    color: var(--blanco);
    font-size: 16px;
    width: 44px;
    height: 38px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s;
    user-select: none;
    touch-action: manipulation;
  }

  .ctrl-btn:active {
    background: rgba(57,255,20,0.2);
    border-color: var(--verde-neon);
  }

  .ctrl-btn.size-btn {
    font-size: 13px;
    font-weight: 900;
    letter-spacing: -1px;
    color: var(--dorado);
  }

  .main-btns {
    display: flex;
    gap: 10px;
    padding: 6px 12px 10px;
    background: rgba(0,0,0,0.95);
    border-top: 1px solid rgba(57,255,20,0.12);
  }

  .btn-capture {
    flex: 2;
    background: linear-gradient(135deg, var(--verde-dark) 0%, var(--verde) 50%, var(--verde-neon) 100%);
    border: none;
    border-radius: 14px;
    color: var(--negro);
    font-size: 16px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 14px 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 20px rgba(57,255,20,0.4);
    transition: all 0.15s;
  }

  .btn-capture:active {
    transform: scale(0.96);
    box-shadow: 0 2px 10px rgba(57,255,20,0.3);
  }

  .btn-change {
    flex: 1;
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    color: var(--blanco);
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 14px 8px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }

  .btn-change:active {
    background: rgba(255,255,255,0.12);
    border-color: var(--dorado);
    color: var(--dorado);
  }

  /* ═══════════════════════════════════════════
     PANTALLA PREVIEW
  ═══════════════════════════════════════════ */
  #screen-preview {
    width: 100%;
    height: 100%;
    display: none;
    flex-direction: column;
    align-items: center;
    background: radial-gradient(ellipse at 50% 0%, #0d3320 0%, #0A0A0A 65%);
    overflow-y: auto;
  }

  .preview-header {
    width: 100%;
    padding: 20px 20px 12px;
    text-align: center;
  }

  .preview-title {
    font-size: clamp(14px, 4vw, 20px);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--dorado);
    filter: drop-shadow(0 0 10px rgba(255,215,0,0.3));
  }

  .preview-sub {
    font-size: 11px;
    color: var(--verde-neon);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 4px;
    opacity: 0.8;
  }

  #canvas-result {
    display: block;
    max-width: min(380px, 88vw);
    max-height: 62vh;
    border-radius: 12px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.7), 0 0 0 2px rgba(57,255,20,0.3);
    object-fit: contain;
  }

  .preview-actions {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    padding: 16px 20px;
    max-width: 420px;
  }

  .btn-download {
    background: linear-gradient(135deg, var(--dorado-dark), var(--dorado));
    border: none;
    border-radius: 14px;
    color: var(--negro);
    font-size: 16px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 2px;
    padding: 16px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    box-shadow: 0 4px 20px rgba(255,215,0,0.35);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-download:active { transform: scale(0.97); }

  .btn-retake {
    background: linear-gradient(135deg, var(--verde-dark), var(--verde));
    border: none;
    border-radius: 14px;
    color: var(--negro);
    font-size: 14px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 14px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .btn-retake:active { transform: scale(0.97); }

  .btn-reselect {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.2);
    border-radius: 14px;
    color: rgba(255,255,255,0.7);
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 12px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }

  .btn-reselect:active {
    border-color: var(--dorado);
    color: var(--dorado);
  }

  /* Flash effect */
  #flash-overlay {
    position: fixed;
    inset: 0;
    background: white;
    opacity: 0;
    pointer-events: none;
    z-index: 9999;
    transition: opacity 0.05s ease;
  }

  /* Countdown */
  #countdown {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 120px;
    font-weight: 900;
    color: white;
    text-shadow: 0 0 40px rgba(57,255,20,0.8), 0 4px 30px rgba(0,0,0,0.8);
    z-index: 25;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
  }

  /* Selected indicator */
  .selected-badge {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 22px;
    height: 22px;
    background: var(--verde-neon);
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    color: #000;
    font-weight: 900;
    z-index: 2;
  }

  .team-btn.selected .selected-badge { display: flex; }
  .team-btn.selected { border-color: var(--verde-neon); }

  /* Camera selected team display */
  #camera-team-name {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    border: 1px solid var(--dorado);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 900;
    letter-spacing: 2px;
    color: var(--dorado);
    text-transform: uppercase;
    pointer-events: none;
    z-index: 16;
    white-space: nowrap;
  }

  #camera-status {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.7);
    border: 1px solid var(--verde-neon);
    border-radius: 12px;
    padding: 6px 12px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: var(--verde-neon);
    text-transform: uppercase;
    pointer-events: none;
    z-index: 16;
    white-space: nowrap;
  }

  #debug-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(0,0,0,0.95);
    border-top: 2px solid var(--rojo, #FF4444);
    color: #FFD700;
    font-size: 11px;
    font-family: monospace;
    padding: 8px;
    max-height: 180px;
    overflow-y: auto;
    z-index: 99999;
    display: none;
  }

  .debug-line {
    line-height: 1.4;
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,215,0,0.1);
  }

  .debug-error {
    color: #FF6B6B;
  }

  .debug-success {
    color: #51CF66;
  }

  .debug-toggle {
    position: fixed;
    top: 10px;
    right: 10px;
    background: rgba(255,100,100,0.7);
    border: 1px solid #FF4444;
    border-radius: 50%;
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 900;
    cursor: pointer;
    z-index: 99998;
    -webkit-tap-highlight-color: transparent;
  }

  @media (min-width: 600px) {
    .teams-grid { grid-template-columns: repeat(3, 1fr); }
    .team-btn img { width: 90px; }
  }

  @media (min-height: 800px) {
    .header-banner { padding: 36px 20px 28px; }
    .select-label { margin: 28px 20px 20px; }
  }
</style>
</head>
<body>

<!-- FLASH -->
<div id="flash-overlay"></div>

<!-- ══════════════════════════════════
     PANTALLA 1: SELECCIÓN
══════════════════════════════════ -->
<div id="screen-select">
  <div class="header-banner">
    <div class="header-stars">★ ★ ★ ★ ★</div>
    <div class="header-title">Mundial<br>Empresarial</div>
    <div class="header-sub">Facultad de Ciencias Empresariales · UGB</div>
    <div class="neon-divider"></div>
  </div>

  <div class="select-label">⚽ Selecciona tu selección ⚽</div>

  <div class="teams-grid" id="teams-grid">
    <button class="team-btn" data-country="alemania" data-flag="🇩🇪" data-label="Alemania" onclick="selectTeam(this)">
      <div class="selected-badge">✓</div>
      <img src="camiseta-alemania.png" alt="Alemania">
      <div class="team-flag">🇩🇪</div>
      <div class="team-name">Alemania</div>
    </button>
    <button class="team-btn" data-country="brasil" data-flag="🇧🇷" data-label="Brasil" onclick="selectTeam(this)">
      <div class="selected-badge">✓</div>
      <img src="camiseta-brasil.png" alt="Brasil">
      <div class="team-flag">🇧🇷</div>
      <div class="team-name">Brasil</div>
    </button>
    <button class="team-btn" data-country="portugal" data-flag="🇵🇹" data-label="Portugal" onclick="selectTeam(this)">
      <div class="selected-badge">✓</div>
      <img src="camiseta-portugal.png" alt="Portugal">
      <div class="team-flag">🇵🇹</div>
      <div class="team-name">Portugal</div>
    </button>
    <button class="team-btn" data-country="espana" data-flag="🇪🇸" data-label="España" onclick="selectTeam(this)">
      <div class="selected-badge">✓</div>
      <img src="camiseta-espana.png" alt="España">
      <div class="team-flag">🇪🇸</div>
      <div class="team-name">España</div>
    </button>
    <button class="team-btn" data-country="francia" data-flag="🇫🇷" data-label="Francia" onclick="selectTeam(this)">
      <div class="selected-badge">✓</div>
      <img src="camiseta-francia.png" alt="Francia">
      <div class="team-flag">🇫🇷</div>
      <div class="team-name">Francia</div>
    </button>
    <button class="team-btn" data-country="argentina" data-flag="🇦🇷" data-label="Argentina" onclick="selectTeam(this)">
      <div class="selected-badge">✓</div>
      <img src="camiseta-argentina.png" alt="Argentina">
      <div class="team-flag">🇦🇷</div>
      <div class="team-name">Argentina</div>
    </button>
  </div>

  <div class="start-hint">Toca tu selección para abrir la cámara</div>
</div>

<!-- ══════════════════════════════════
     PANTALLA 2: CÁMARA
══════════════════════════════════ -->
<div id="screen-camera">
  <div id="viewport">
    <video id="video" autoplay playsinline muted></video>
    <img id="overlay-shirt" src="" alt="camiseta">
    <img id="overlay-frame" src="marco.png" alt="marco">
    <div id="countdown"></div>
    <div class="guide-label">
      Rostro arriba · Torso en la camiseta
    </div>
    <div id="camera-team-name"></div>
    <div id="camera-status">Inicializando cámara...</div>
  </div>

  <!-- Controles de ajuste -->
  <div class="controls-panel">
    <div class="ctrl-label">Ajustar posición y tamaño</div>
    <div class="controls-row">
      <button class="ctrl-btn" ontouchstart="startMove('up')" onmousedown="startMove('up')" ontouchend="stopMove()" onmouseup="stopMove()" onmouseleave="stopMove()" title="Arriba">▲</button>
      <button class="ctrl-btn" ontouchstart="startMove('down')" onmousedown="startMove('down')" ontouchend="stopMove()" onmouseup="stopMove()" onmouseleave="stopMove()" title="Abajo">▼</button>
      <button class="ctrl-btn" ontouchstart="startMove('left')" onmousedown="startMove('left')" ontouchend="stopMove()" onmouseup="stopMove()" onmouseleave="stopMove()" title="Izquierda">◀</button>
      <button class="ctrl-btn" ontouchstart="startMove('right')" onmousedown="startMove('right')" ontouchend="stopMove()" onmouseup="stopMove()" onmouseleave="stopMove()" title="Derecha">▶</button>
      <button class="ctrl-btn size-btn" ontouchstart="startMove('bigger')" onmousedown="startMove('bigger')" ontouchend="stopMove()" onmouseup="stopMove()" onmouseleave="stopMove()" title="Más grande">＋</button>
      <button class="ctrl-btn size-btn" ontouchstart="startMove('smaller')" onmousedown="startMove('smaller')" ontouchend="stopMove()" onmouseup="stopMove()" onmouseleave="stopMove()" title="Más pequeña">－</button>
    </div>
  </div>

  <div class="main-btns">
    <button class="btn-change" onclick="goToSelect()">🔄 Cambiar</button>
    <button class="btn-capture" onclick="takePhoto()">📸 Tomar foto</button>
  </div>
</div>

<!-- ══════════════════════════════════
     PANTALLA 3: PREVIEW
══════════════════════════════════ -->
<div id="screen-preview">
  <div class="preview-header">
    <div class="preview-title">¡Tu foto del Mundial!</div>
    <div class="preview-sub">Open House · UGB 2025</div>
  </div>
  <canvas id="canvas-result"></canvas>
  <div class="preview-actions">
    <button class="btn-download" onclick="downloadPhoto()">⬇ Descargar recuerdo</button>
    <button class="btn-retake" onclick="retakePhoto()">📸 Tomar otra foto</button>
    <button class="btn-reselect" onclick="goToSelect()">⚽ Cambiar selección</button>
  </div>
</div>

<!-- Canvas oculto para composición -->
<canvas id="canvas-hidden"></canvas>

<!-- DEBUG PANEL -->
<div id="debug-toggle" class="debug-toggle" onclick="toggleDebug()">🐛</div>
<div id="debug-panel"></div>

<script>
  // ══════════════════════════════════════
  // DEBUG LOGGING
  // ══════════════════════════════════════
  const debugLogs = [];
  const MAX_LOGS = 30;

  function addLog(msg, type = 'info') {
    const timestamp = new Date().toLocaleTimeString();
    const logEntry = `[${timestamp}] ${msg}`;
    debugLogs.push({ msg: logEntry, type });
    if (debugLogs.length > MAX_LOGS) debugLogs.shift();
    updateDebugPanel();
    console.log(msg);
  }

  function updateDebugPanel() {
    const panel = document.getElementById('debug-panel');
    panel.innerHTML = debugLogs.map(log => 
      `<div class="debug-line debug-${log.type}">${log.msg}</div>`
    ).join('');
    panel.scrollTop = panel.scrollHeight;
  }

  function toggleDebug() {
    const panel = document.getElementById('debug-panel');
    const toggle = document.getElementById('debug-toggle');
    if (panel.style.display === 'none' || !panel.style.display) {
      panel.style.display = 'block';
      toggle.style.background = 'rgba(51,255,20,0.7)';
      addLog('DEBUG PANEL ABIERTO', 'success');
    } else {
      panel.style.display = 'none';
      toggle.style.background = 'rgba(255,100,100,0.7)';
    }
  }

  // Capturar errores globales
  window.addEventListener('error', (e) => {
    addLog(`ERROR: ${e.message}`, 'error');
  });

  // Capturar rechazos de promesas no capturadas
  window.addEventListener('unhandledrejection', (e) => {
    addLog(`PROMISE ERROR: ${e.reason}`, 'error');
  });
  const state = {
    selectedCountry: null,
    selectedLabel: null,
    selectedFlag: null,
    shirtX: 0,
    shirtY: 0,
    shirtScale: 1,
    stream: null,
    moveInterval: null,
    // Posición inicial relativa al viewport
    initX: 0,
    initY: 0,
    initW: 0,
  };

  // Imágenes precargadas
  const shirtImgs = {};
  const frameImg = new Image();
  frameImg.src = 'marco.png';

  const countries = ['alemania','brasil','portugal','espana','francia','argentina'];
  countries.forEach(c => {
    const img = new Image();
    img.src = `camiseta-${c}.png`;
    shirtImgs[c] = img;
  });

  // ══════════════════════════════════════
  // SELECCIÓN DE EQUIPO
  // ══════════════════════════════════════
  function selectTeam(btn) {
    addLog(`⚽ Equipo tocado: ${btn.dataset.label}`, 'info');
    document.querySelectorAll('.team-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');

    state.selectedCountry = btn.dataset.country;
    state.selectedLabel = btn.dataset.label;
    state.selectedFlag = btn.dataset.flag;

    addLog(`✓ Estado actualizado: ${state.selectedCountry}`, 'success');
    startCamera();
  }

  // ══════════════════════════════════════
  // CÁMARA
  // ══════════════════════════════════════
  async function startCamera() {
    addLog('→ Abriendo pantalla cámara...', 'info');
    showScreen('camera');

    // Mostrar nombre selección
    document.getElementById('camera-team-name').textContent =
      `${state.selectedFlag} ${state.selectedLabel}`;
    addLog(`✓ Equipo seleccionado: ${state.selectedLabel}`, 'success');

    // Configurar overlay de camiseta
    const shirtEl = document.getElementById('overlay-shirt');
    shirtEl.src = `camiseta-${state.selectedCountry}.png`;
    addLog(`✓ Camiseta establecida: camiseta-${state.selectedCountry}.png`, 'success');

    const statusEl = document.getElementById('camera-status');

    // Iniciar stream si no está activo
    if (!state.stream) {
      try {
        statusEl.textContent = '📍 Solicitando cámara...';
        addLog('🔹 Solicitando acceso a cámara...', 'info');
        
        const constraints = {
          video: {
            facingMode: 'user',
            width: { min: 640, ideal: 1080, max: 1920 },
            height: { min: 480, ideal: 1920, max: 2160 }
          },
          audio: false
        };
        
        state.stream = await navigator.mediaDevices.getUserMedia(constraints);
        addLog('✓ Stream obtenido', 'success');
        
        const videoEl = document.getElementById('video');
        videoEl.srcObject = state.stream;
        addLog('✓ Stream asignado a video element', 'success');
        statusEl.textContent = '⏳ Cargando video...';
        addLog('⏳ Esperando que el video esté listo...', 'info');
        
        // Esperar a que el video esté listo
        await new Promise((resolve) => {
          const checkReady = () => {
            if (videoEl.readyState === videoEl.HAVE_FUTURE_DATA) {
              addLog(`✓ Video ready (readyState: ${videoEl.readyState})`, 'success');
              resolve();
            } else {
              setTimeout(checkReady, 100);
            }
          };
          checkReady();
          setTimeout(() => {
            addLog('⚠ Timeout en carga de video, continuando...', 'info');
            resolve();
          }, 3000);
        });
        
        statusEl.textContent = '✓ Listo';
        addLog('✓ Cámara LISTA', 'success');
        setTimeout(() => {
          statusEl.style.opacity = '0';
          statusEl.style.transition = 'opacity 0.5s';
        }, 800);
        
      } catch(e) {
        addLog(`❌ ERROR: ${e.name} - ${e.message}`, 'error');
        let msg = 'No se pudo acceder a la cámara.';
        if (e.name === 'NotAllowedError') {
          msg = 'Permiso denegado. Ve a Configuración > Privacidad > Cámara.';
          addLog('🚫 Permiso denegado por usuario', 'error');
        } else if (e.name === 'NotFoundError') {
          msg = 'No se encontró cámara en el dispositivo.';
          addLog('🔍 Cámara no encontrada', 'error');
        } else if (e.name === 'NotReadableError') {
          msg = 'La cámara está siendo usada por otra aplicación.';
          addLog('🔒 Cámara en uso', 'error');
        }
        statusEl.textContent = '❌ Error';
        alert(msg);
        showScreen('select');
        return;
      }
    } else {
      addLog('✓ Usando stream existente', 'success');
      statusEl.textContent = '✓ Listo';
      setTimeout(() => {
        statusEl.style.opacity = '0';
      }, 800);
    }

    // Posicionar camiseta inicial después de que el viewport tenga tamaño
    requestAnimationFrame(() => {
      setTimeout(() => {
        addLog('📍 Inicializando posición de camiseta...', 'info');
        initShirtPosition();
      }, 300);
    });
  }

  function initShirtPosition() {
    const vp = document.getElementById('viewport');
    const vpW = vp.clientWidth;
    const vpH = vp.clientHeight;

    // Camiseta ocupa ~65% del ancho, centrada horizontalmente, a ~48% de altura (más abajo)
    state.shirtScale = 1;
    state.initW = Math.round(vpW * 0.68);
    state.initX = Math.round((vpW - state.initW) / 2);
    state.initY = Math.round(vpH * 0.48);  // Cambié de 0.34 a 0.48 para más abajo

    state.shirtX = 0;
    state.shirtY = 0;

    updateShirtPosition();
  }

  function updateShirtPosition() {
    const vp = document.getElementById('viewport');
    const vpW = vp.clientWidth;
    const shirt = document.getElementById('overlay-shirt');

    const currentW = Math.round(state.initW * state.shirtScale);
    const currentH = 'auto';
    const currentX = state.initX + state.shirtX;
    const currentY = state.initY + state.shirtY;

    shirt.style.width = currentW + 'px';
    shirt.style.height = 'auto';
    shirt.style.left = currentX + 'px';
    shirt.style.top = currentY + 'px';
    shirt.style.zIndex = '10';
  }

  // ══════════════════════════════════════
  // CONTROLES DE MOVIMIENTO
  // ══════════════════════════════════════
  const MOVE_STEP = 3;
  const SIZE_STEP = 0.03;

  function applyMove(dir) {
    switch(dir) {
      case 'up':      state.shirtY -= MOVE_STEP; break;
      case 'down':    state.shirtY += MOVE_STEP; break;
      case 'left':    state.shirtX -= MOVE_STEP; break;
      case 'right':   state.shirtX += MOVE_STEP; break;
      case 'bigger':  state.shirtScale = Math.min(state.shirtScale + SIZE_STEP, 2.5); break;
      case 'smaller': state.shirtScale = Math.max(state.shirtScale - SIZE_STEP, 0.2); break;
    }
    updateShirtPosition();
  }

  function startMove(dir) {
    applyMove(dir);
    state.moveInterval = setInterval(() => applyMove(dir), 80);
  }

  function stopMove() {
    if (state.moveInterval) {
      clearInterval(state.moveInterval);
      state.moveInterval = null;
    }
  }

  // ══════════════════════════════════════
  // TOMAR FOTO
  // ══════════════════════════════════════
  function takePhoto() {
    let count = 3;
    const countEl = document.getElementById('countdown');
    countEl.style.opacity = '1';
    countEl.textContent = count;

    const timer = setInterval(() => {
      count--;
      if (count > 0) {
        countEl.textContent = count;
      } else {
        clearInterval(timer);
        countEl.textContent = '📸';
        setTimeout(() => {
          captureFrame();
          countEl.style.opacity = '0';
        }, 300);
      }
    }, 800);
  }

  function captureFrame() {
    // Flash
    const flash = document.getElementById('flash-overlay');
    flash.style.opacity = '1';
    setTimeout(() => { flash.style.opacity = '0'; }, 120);

    const video = document.getElementById('video');
    const vp = document.getElementById('viewport');
    const vpW = vp.clientWidth;
    const vpH = vp.clientHeight;

    // Canvas de alta calidad — 9:16 a 1080×1920
    const RENDER_W = 1080;
    const RENDER_H = 1920;
    const scale = RENDER_W / vpW;

    const canvas = document.getElementById('canvas-result');
    canvas.width = RENDER_W;
    canvas.height = RENDER_H;
    const ctx = canvas.getContext('2d');

    // 1) Dibujar video (selfie espejo)
    ctx.save();
    ctx.translate(RENDER_W, 0);
    ctx.scale(-1, 1);

    // Calcular crop para objectFit: cover
    const vidW = video.videoWidth || 1080;
    const vidH = video.videoHeight || 1920;
    const vidAR = vidW / vidH;
    const canAR = RENDER_W / RENDER_H;

    let sx, sy, sw, sh;
    if (vidAR > canAR) {
      sh = vidH;
      sw = vidH * canAR;
      sx = (vidW - sw) / 2;
      sy = 0;
    } else {
      sw = vidW;
      sh = vidW / canAR;
      sx = 0;
      sy = (vidH - sh) / 2;
    }
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, RENDER_W, RENDER_H);
    ctx.restore();

    // 2) Dibujar camiseta
    const shirtEl = document.getElementById('overlay-shirt');
    const shirtCSS = shirtEl.getBoundingClientRect();
    const vpRect = vp.getBoundingClientRect();

    const sx2 = (shirtCSS.left - vpRect.left) * scale;
    const sy2 = (shirtCSS.top - vpRect.top) * scale;
    const sw2 = shirtCSS.width * scale;
    const sh2 = shirtCSS.height * scale;

    const shirtSrc = shirtImgs[state.selectedCountry];
    if (shirtSrc && shirtSrc.complete && shirtSrc.naturalWidth > 0) {
      try {
        ctx.drawImage(shirtSrc, sx2, sy2, sw2, sh2);
        console.log('✓ Camiseta dibujada correctamente');
      } catch(e) {
        console.error('Error al dibujar camiseta:', e);
      }
    } else {
      console.warn('⚠️ Camiseta no cargada. Reintentando...');
      // Recargar la imagen
      const img = new Image();
      img.onload = () => {
        ctx.drawImage(img, sx2, sy2, sw2, sh2);
      };
      img.src = `camiseta-${state.selectedCountry}.png`;
    }

    // 3) Dibujar marco
    if (frameImg && frameImg.complete && frameImg.naturalWidth > 0) {
      ctx.drawImage(frameImg, 0, 0, RENDER_W, RENDER_H);
      console.log('✓ Marco dibujado correctamente');
    } else {
      console.warn('⚠️ Marco no cargado');
      frameImg.onload = () => {
        ctx.drawImage(frameImg, 0, 0, RENDER_W, RENDER_H);
      };
    }

    showScreen('preview');
  }

  // ══════════════════════════════════════
  // DESCARGAR
  // ══════════════════════════════════════
  function downloadPhoto() {
    const canvas = document.getElementById('canvas-result');
    const country = state.selectedCountry || 'ugb';
    const date = new Date();
    const dateStr = `${date.getFullYear()}${String(date.getMonth()+1).padStart(2,'0')}${String(date.getDate()).padStart(2,'0')}-${String(date.getHours()).padStart(2,'0')}${String(date.getMinutes()).padStart(2,'0')}`;
    const filename = `foto-ugb-${country}-${dateStr}.png`;

    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }, 'image/png');
  }

  // ══════════════════════════════════════
  // NAVEGACIÓN
  // ══════════════════════════════════════
  function showScreen(name) {
    document.getElementById('screen-select').style.display = 'none';
    document.getElementById('screen-camera').style.display = 'none';
    document.getElementById('screen-preview').style.display = 'none';

    if (name === 'select') {
      document.getElementById('screen-select').style.display = 'flex';
    } else if (name === 'camera') {
      document.getElementById('screen-camera').style.display = 'flex';
    } else if (name === 'preview') {
      document.getElementById('screen-preview').style.display = 'flex';
    }
  }

  function goToSelect() {
    // Detener cámara al salir
    if (state.stream) {
      state.stream.getTracks().forEach(t => t.stop());
      state.stream = null;
    }
    showScreen('select');
  }

  function retakePhoto() {
    // Volver a cámara con mismo equipo
    startCamera();
  }

  // Pantalla inicial
  showScreen('select');

  // Prevenir scroll en controles táctiles
  document.querySelectorAll('.ctrl-btn').forEach(btn => {
    btn.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
  });
</script>
